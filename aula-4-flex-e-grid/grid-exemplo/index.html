<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo Prático - Layout com Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <header class="header">
        <h1>Header</h1>
      </header>

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <p>Item 1</p>
        <p>Item 2</p>
        <p>Item 3</p>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <h2>Main</h2>

        <!-- Cards dentro do main -->
        <div class="cards">
          <div class="card card-small">Card 1</div>
          <div class="card card-medium">Card 2</div>
          <div class="card card-large">Card 3</div>
        </div>
      </main>

      <!-- FOOTER -->
      <footer class="footer">
        <p>Footer</p>
      </footer>
    </div>
  </body>
</html>
