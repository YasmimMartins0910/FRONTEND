<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pedido de Pizza</title>
</head>
<body>

  <h2>🍕Pedido de Pizza</h2>

  <form>

    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome" required><br><br>

    <label for="telefone">Telefone:</label><br>
    <input type="tel" id="telefone" name="telefone" required><br><br>

    <label for="sabor">Sabor:</label><br>
    <select id="sabor" name="sabor" required>
      <option value="">Selecione</option>
      <option value="calabresa">Calabresa</option>
      <option value="mussarela">Mussarela</option>
      <option value="frango">Frango com Catupiry</option>
      <option value="strogonoff">Strogonoff de carne</option>
    </select><br><br>

    <label>Tamanho:</label><br>
    <input type="radio" id="pequena" name="tamanho" value="pequena" required>
    <label for="pequena">Pequena</label><br>

    <input type="radio" id="media" name="tamanho" value="media">
    <label for="media">Média</label><br>

    <input type="radio" id="grande" name="tamanho" value="grande">
    <label for="grande">Grande</label><br><br>

    <label for="quantidade">Quantidade:</label><br>
    <input type="number" id="quantidade" name="quantidade" min="1" required><br><br>

    <label for="observacoes">Observações:</label><br>
    <textarea id="observacoes" name="observacoes" rows="4" cols="30"></textarea><br><br>

    <button type="submit">Enviar Pedido</button>

  </form>

</body>
</html>
