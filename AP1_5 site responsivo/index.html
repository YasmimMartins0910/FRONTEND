<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>League of Legends</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>

    <div class="cards">

      <div class="left-cards">

        <div class="card">
          <div class="card-image">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Lux_0.jpg" alt="Lux" />
          </div>
          <div class="card-content">
            <p>reflexo da luz</p>
            <h3>Lux</h3>
          </div>
        </div>

        <div class="card">
          <div class="card-image">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Yasuo_0.jpg" alt="Yasuo" />
          </div>
          <div class="card-content">
            <p>o imperdoável</p>
            <h3>Yasuo</h3>
          </div>
        </div>

        <div class="card">
          <div class="card-image">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg" alt="Ahri" />
          </div>
          <div class="card-content">
            <p>a raposa de nove caudas</p>
            <h3>Ahri</h3>
          </div>
        </div>

        <div class="card">
          <div class="card-image">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Zed_0.jpg" alt="Zed" />
          </div>
          <div class="card-content">
            <p>o mestre das sombras</p>
            <h3>Zed</h3>
          </div>
        </div>

      </div>

      <div class="big-card">
        <div class="card">
          <div class="card-image">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Garen_0.jpg" alt="Garen" />
          </div>
          <div class="card-content">
            <p>o poder de demacia</p>
            <h3>Garen</h3>
          </div>
        </div>
      </div>

    </div>

  </body>
</html>
